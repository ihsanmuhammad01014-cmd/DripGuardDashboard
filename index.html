<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DripGuard Login</title>

<link rel="stylesheet" href="Login.css">

</head>

<body>

    <div id="loadingScreen">

        <img src="assets/logo-clean.png" alt="DripGuard">

        <!--
        <h1>DRIPGUARD</h1>
        <p>Smart Infusion Monitoring System</p>
        -->

    </div>

    <div id="mainContent">

        <div class="login-box">

            <h1>DRIPGUARD</h1>

            <h3>Login Perawat</h3>

            <input
                type="text"
                id="username"
                placeholder="Username">

            <input
                type="password"
                id="password"
                placeholder="Password">

            <button onclick="login()">
                LOGIN
            </button>

            <p id="error"></p>

        </div>

    </div>

    <script src="Login.js"></script>

</body>

</html>
